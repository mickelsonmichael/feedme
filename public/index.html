<!doctype html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <!--
      Previous versions of this app registered a Cross-Origin-Isolation
      service worker (coi-serviceworker) so expo-sqlite could use OPFS on the
      web. We now use localStorage on the web (see src/database.web.ts), so
      the service worker is no longer needed and was causing intermittent
      "ServiceWorker intercepted the request" errors. Proactively unregister
      any leftover registrations from previously-cached visits.
    -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then(function (regs) {
            regs.forEach(function (reg) {
              if (
                reg.active &&
                reg.active.scriptURL &&
                reg.active.scriptURL.indexOf("coi-serviceworker") !== -1
              ) {
                reg.unregister();
              }
            });
          })
          .catch(function () {
            /* ignore */
          });
      }
    </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript> You need to enable JavaScript to run this app. </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
